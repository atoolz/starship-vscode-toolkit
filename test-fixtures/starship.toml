# Starship Configuration - Test Fixture
# https://starship.rs/config/

format = "$all"
command_timeout = 500
scan_timeout = 30
add_newline = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
home_symbol = "~"
read_only = "🔒"

[git_branch]
symbol = "🌱 "
style = "bold purple"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!"
staged = "+"
untracked = "?"
stashed = "$"
style = "bold red"

[git_commit]
commit_hash_length = 7
style = "bold green"
only_detached = true

[nodejs]
symbol = "⬢ "
detect_files = ["package.json", ".node-version"]
format = "[$symbol($version )]($style)"
style = "bold green"

[python]
symbol = "🐍 "
detect_extensions = ["py"]
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
style = "bold yellow"

[rust]
symbol = "🦀 "
format = "[$symbol($version )]($style)"
style = "bold red"

[golang]
symbol = "🐹 "
style = "bold cyan"
format = "via [$symbol($version )]($style)"

[docker_context]
symbol = "🐳 "
style = "blue bold"
only_with_files = true

[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold cyan"

[terraform]
symbol = "💠 "
style = "bold 105"
format = "via [$symbol$workspace]($style) "

[aws]
disabled = false
symbol = "☁️  "
style = "bold yellow"

[time]
disabled = false
style = "bold yellow"
time_format = "%T"
use_12hr = false

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = false

[java]
symbol = "☕ "
style = "bold red dimmed"

[php]
symbol = "🐘 "
style = "bold 147"

[ruby]
symbol = "💎 "
style = "bold red"

[custom.docker]
command = "docker version --format '{{.Server.Version}}'"
when = "command -v docker"
symbol = "🐳 "
